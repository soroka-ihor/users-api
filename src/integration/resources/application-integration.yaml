resilience4j:
  circuitbreaker:
    configs:
      database:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
    instances:
      postgres-db:
        base-config: database
      oracle-db:
        base-config: database
      mysql-db:
        base-config: database

app:
  async:
    core-pool-size: 5
    max-pool-size: 20
    queue-capacity: 100
    keep-alive-seconds: 60
  data-sources:
    - name: postgres-db
      strategy: postgres
      url: jdbc:postgresql://localhost:54331/users_db
      table: users
      user: testuser
      password: testpass
      query-timeout-seconds: 5
      pool:
        maximum-pool-size: 10
        minimum-idle: 2
        connection-timeout-ms: 5000
        idle-timeout-ms: 300000
        max-lifetime-ms: 600000
      mapping:
        id: user_id
        username: login
        name: first_name
        surname: last_name
    - name: oracle-db
      strategy: oracle
      url: jdbc:oracle:thin:@localhost:15211/users_db
      table: user_table
      user: testuser
      password: testpass
      query-timeout-seconds: 5
      pool:
        maximum-pool-size: 10
        minimum-idle: 2
        connection-timeout-ms: 5000
        idle-timeout-ms: 300000
        max-lifetime-ms: 600000
      mapping:
        id: ldap_login
        username: ldap_login
        name: name
        surname: surname
    - name: mysql-db
      strategy: mysql
      url: jdbc:mysql://localhost:33061/users_db
      table: users
      user: testuser
      password: testpass
      query-timeout-seconds: 5
      pool:
        maximum-pool-size: 10
        minimum-idle: 2
        connection-timeout-ms: 5000
        idle-timeout-ms: 300000
        max-lifetime-ms: 600000
      mapping:
        id: user_id
        username: login
        name: first_name
        surname: last_name
